<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seaglass</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    transition: background 0.8s ease, color 0.8s ease;
  }

  body.mode-blackbox {
    background: #080808;
    color: #e0e0e0;
  }

  body.mode-glass {
    background: #f4f3f1;
    color: #1a1a1a;
  }

  /* Wordmark */
  .wordmark {
    position: fixed;
    bottom: 24px;
    right: 28px;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.8s ease;
  }
  .mode-blackbox .wordmark { color: #282828; }
  .mode-glass .wordmark { color: #ccc; }

  /* Toggle */
  .toggle-container {
    margin-bottom: 64px;
    display: flex;
    align-items: center;
    position: relative;
    user-select: none;
    z-index: 10;
  }

  .toggle-track {
    display: flex;
    border-radius: 4px;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    transition: background 0.6s ease, border-color 0.6s ease;
  }

  .mode-blackbox .toggle-track {
    background: #141414;
    border: 1px solid #222;
  }
  .mode-glass .toggle-track {
    background: #e8e7e5;
    border: 1px solid #d0cfcd;
  }

  .toggle-option {
    padding: 10px 24px;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.08em;
    position: relative;
    z-index: 1;
    transition: color 0.4s ease;
    text-transform: uppercase;
  }

  .mode-blackbox .toggle-option { color: #555; }
  .mode-blackbox .toggle-option.active { color: #e0e0e0; }
  .mode-glass .toggle-option { color: #999; }
  .mode-glass .toggle-option.active { color: #1a1a1a; }

  .toggle-slider {
    position: absolute;
    top: 2px;
    left: 2px;
    height: calc(100% - 4px);
    width: calc(50% - 2px);
    border-radius: 3px;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                background 0.6s ease, border-color 0.6s ease;
  }

  .mode-blackbox .toggle-slider {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
  }
  .mode-glass .toggle-slider {
    background: #fff;
    border: 1px solid #d8d7d5;
  }

  .toggle-slider.glass-pos {
    transform: translateX(100%);
  }

  /* Stage */
  .stage {
    width: 90vw;
    max-width: 1100px;
    height: 340px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Sentences */
  .sentence {
    position: absolute;
    font-size: 15px;
    font-weight: 300;
    line-height: 1.6;
    max-width: 280px;
    white-space: normal;
    transition: color 0.8s ease;
  }

  .sentence-input {
    left: 0;
    text-align: left;
  }
  .mode-blackbox .sentence-input { color: #666; }
  .mode-glass .sentence-input { color: #888; }

  .sentence-output {
    right: 0;
    text-align: right;
  }
  .mode-blackbox .sentence-output { color: #e0e0e0; }
  .mode-glass .sentence-output { color: #1a1a1a; }

  /* Center box */
  .center-box {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .mode-blackbox .center-box {
    width: 160px;
    height: 160px;
    background: #0f0f0f;
    border: 1px solid #1a1a1a;
  }

  .mode-glass .center-box {
    width: 400px;
    height: 240px;
    background: rgba(0, 0, 0, 0.02);
    border: 1px solid rgba(0, 0, 0, 0.08);
  }

  /* Tokens for glass mode */
  .token {
    position: absolute;
    font-size: 14px;
    font-weight: 300;
    opacity: 0;
    transition: none;
    pointer-events: none;
  }

  .token-label {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: block;
    margin-top: 2px;
    opacity: 0.4;
  }

  .layer-syntax { color: #4a7a9b; }
  .layer-meaning { color: #9b7a4a; }
  .layer-tone { color: #6b9b5a; }
  .layer-intent { color: #9b4a7a; }

  .mode-blackbox .layer-syntax { color: #6b8aad; }
  .mode-blackbox .layer-meaning { color: #ad8a6b; }
  .mode-blackbox .layer-tone { color: #8aad6b; }
  .mode-blackbox .layer-intent { color: #ad6b8a; }

  /* Processing indicator */
  .processing {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0;
    transition: color 0.8s ease;
  }
  .mode-blackbox .processing { color: #333; }
  .mode-glass .processing { color: #bbb; }

  /* Traveler */
  .traveler {
    position: absolute;
    font-size: 15px;
    font-weight: 300;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body class="mode-blackbox">

<div class="toggle-container">
  <div class="toggle-track" id="toggle">
    <div class="toggle-slider" id="slider"></div>
    <div class="toggle-option active" id="opt-blackbox">Black Box</div>
    <div class="toggle-option" id="opt-glass">Glass</div>
  </div>
</div>

<div class="stage" id="stage">
  <div class="sentence sentence-input" id="input-sentence"></div>
  <div class="center-box" id="box"></div>
  <div class="processing" id="processing">processing</div>
  <div class="sentence sentence-output" id="output-sentence"></div>
</div>

<div class="wordmark">Seaglass</div>

<script>
const INPUT = "Can you make this sound less aggressive and more like a professional request?";
const OUTPUT = "I'd appreciate your help adjusting the tone to feel more collaborative and polished.";

const LAYERS = [
  { word: "Can you", layer: "syntax", label: "interrogative", newWord: "I'd appreciate" },
  { word: "make this", layer: "intent", label: "directive", newWord: "your help" },
  { word: "sound less", layer: "tone", label: "hedging", newWord: "adjusting the" },
  { word: "aggressive", layer: "meaning", label: "negative frame", newWord: "tone to feel" },
  { word: "and more like", layer: "syntax", label: "comparative", newWord: "more collaborative" },
  { word: "a professional", layer: "meaning", label: "qualifier", newWord: "and" },
  { word: "request?", layer: "intent", label: "desired outcome", newWord: "polished." },
];

let mode = 'blackbox';
let loopRunning = false;
let cancelRequested = false;
let animationTimers = [];

const $ = id => document.getElementById(id);
const stage = $('stage');
const box = $('box');

function clearElements() {
  animationTimers.forEach(t => clearTimeout(t));
  animationTimers = [];
  document.querySelectorAll('.token, .traveler').forEach(el => el.remove());
  $('input-sentence').textContent = '';
  $('input-sentence').style.opacity = '1';
  $('output-sentence').textContent = '';
  $('output-sentence').style.opacity = '0';
  $('processing').style.opacity = '0';
}

function delay(ms) {
  return new Promise(resolve => {
    animationTimers.push(setTimeout(resolve, ms));
  });
}

function checkCancel() {
  if (cancelRequested) throw new Error('cancelled');
}

function animate(el, props, duration, easing = 'cubic-bezier(0.16, 1, 0.3, 1)') {
  return new Promise(resolve => {
    el.style.transition = `all ${duration}ms ${easing}`;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        Object.assign(el.style, props);
        animationTimers.push(setTimeout(resolve, duration));
      });
    });
  });
}

async function runBlackBox() {
  clearElements();
  const input = $('input-sentence');
  const output = $('output-sentence');

  input.textContent = INPUT;
  input.style.opacity = '0';
  await delay(200); checkCancel();
  await animate(input, { opacity: '1' }, 600); checkCancel();
  await delay(800); checkCancel();

  // Create traveler
  const traveler = document.createElement('div');
  traveler.className = 'traveler';
  traveler.textContent = INPUT;
  traveler.style.color = mode === 'blackbox' ? '#666' : '#888';
  const inputRect = input.getBoundingClientRect();
  const stageRect = stage.getBoundingClientRect();
  traveler.style.left = (inputRect.left - stageRect.left) + 'px';
  traveler.style.top = (inputRect.top - stageRect.top) + 'px';
  traveler.style.opacity = '1';
  stage.appendChild(traveler);
  input.style.opacity = '0';

  const boxRect = box.getBoundingClientRect();
  const targetX = boxRect.left - stageRect.left - 10;
  const targetY = boxRect.top - stageRect.top + boxRect.height / 2 - 10;

  await animate(traveler, {
    left: targetX + 'px',
    top: targetY + 'px',
    opacity: '0',
    transform: 'scale(0.8)'
  }, 900); checkCancel();
  traveler.remove();

  // Processing
  const proc = $('processing');
  await animate(proc, { opacity: '1' }, 300); checkCancel();
  await delay(1400); checkCancel();
  await animate(proc, { opacity: '0' }, 300); checkCancel();
  await delay(200); checkCancel();

  // Output emerges
  const outColor = mode === 'blackbox' ? '#e0e0e0' : '#1a1a1a';
  const outTraveler = document.createElement('div');
  outTraveler.className = 'traveler';
  outTraveler.textContent = OUTPUT;
  outTraveler.style.color = outColor;
  const outTargetRect = output.getBoundingClientRect();
  outTraveler.style.left = (boxRect.right - stageRect.left + 10) + 'px';
  outTraveler.style.top = (boxRect.top - stageRect.top + boxRect.height / 2 - 10) + 'px';
  outTraveler.style.opacity = '0';
  outTraveler.style.transform = 'scale(0.8)';
  stage.appendChild(outTraveler);

  await animate(outTraveler, {
    left: (outTargetRect.left - stageRect.left) + 'px',
    top: (outTargetRect.top - stageRect.top) + 'px',
    opacity: '1',
    transform: 'scale(1)'
  }, 900); checkCancel();

  outTraveler.remove();
  output.textContent = OUTPUT;
  output.style.opacity = '1';
  await animate(output, { opacity: '1' }, 400); checkCancel();

  // Hold the result visible
  await delay(2000); checkCancel();
}

async function runGlass() {
  clearElements();
  const input = $('input-sentence');
  const output = $('output-sentence');

  input.textContent = INPUT;
  input.style.opacity = '0';
  await delay(200); checkCancel();
  await animate(input, { opacity: '1' }, 600); checkCancel();
  await delay(800); checkCancel();

  input.style.opacity = '0';

  const stageRect = stage.getBoundingClientRect();
  const boxRect = box.getBoundingClientRect();
  const inputRect = input.getBoundingClientRect();

  const tokens = [];
  const boxCenterY = boxRect.top - stageRect.top + boxRect.height / 2;
  const startX = inputRect.left - stageRect.left;
  const startY = inputRect.top - stageRect.top;

  LAYERS.forEach((item, i) => {
    const token = document.createElement('div');
    token.className = `token layer-${item.layer}`;
    token.innerHTML = `${item.word}<span class="token-label">${item.label}</span>`;
    token.style.left = startX + 'px';
    token.style.top = (startY + i * 4) + 'px';
    token.style.opacity = '0';
    stage.appendChild(token);
    tokens.push({ el: token, data: item, index: i });
  });

  const rows = LAYERS.length;
  const spacing = 32;
  const totalHeight = rows * spacing;
  const topOffset = boxCenterY - totalHeight / 2;

  for (let i = 0; i < tokens.length; i++) {
    const t = tokens[i];
    await delay(120); checkCancel();
    t.el.style.opacity = '1';
    const targetX = boxRect.left - stageRect.left + 24;
    const targetY = topOffset + i * spacing;
    animate(t.el, {
      left: targetX + 'px',
      top: targetY + 'px',
      opacity: '1'
    }, 700);
  }

  await delay(900); checkCancel();

  // Analyze
  for (let i = 0; i < tokens.length; i++) {
    const t = tokens[i];
    const label = t.el.querySelector('.token-label');
    if (label) label.style.opacity = '0.8';
    animate(t.el, {
      left: (boxRect.left - stageRect.left + 20 + Math.sin(i * 1.2) * 15) + 'px'
    }, 500);
    await delay(200); checkCancel();
  }

  await delay(600); checkCancel();

  // Transform
  for (let i = 0; i < tokens.length; i++) {
    const t = tokens[i];
    await animate(t.el, { opacity: '0.3', transform: 'scale(0.95)' }, 250); checkCancel();
    t.el.innerHTML = `${t.data.newWord}<span class="token-label layer-${t.data.layer}" style="opacity:0.8">${t.data.label}</span>`;
    await animate(t.el, { opacity: '1', transform: 'scale(1)' }, 250); checkCancel();
    await delay(100); checkCancel();
  }

  await delay(600); checkCancel();

  // Reassemble
  const outputRect = output.getBoundingClientRect();
  const outX = outputRect.right - stageRect.left;
  const outY = outputRect.top - stageRect.top;

  for (let i = 0; i < tokens.length; i++) {
    const t = tokens[i];
    const label = t.el.querySelector('.token-label');
    if (label) label.style.opacity = '0';
    animate(t.el, {
      left: (outX - 200) + 'px',
      top: (outY + i * 2) + 'px',
      opacity: '0'
    }, 800);
    await delay(80); checkCancel();
  }

  await delay(600); checkCancel();

  tokens.forEach(t => t.el.remove());
  output.textContent = OUTPUT;
  await animate(output, { opacity: '1' }, 500); checkCancel();

  // Hold
  await delay(2000); checkCancel();
}

function applyMode(newMode) {
  mode = newMode;
  document.body.className = `mode-${mode}`;
  if (mode === 'glass') {
    $('slider').classList.add('glass-pos');
    $('opt-blackbox').classList.remove('active');
    $('opt-glass').classList.add('active');
  } else {
    $('slider').classList.remove('glass-pos');
    $('opt-blackbox').classList.add('active');
    $('opt-glass').classList.remove('active');
  }
}

async function loop() {
  loopRunning = true;
  while (true) {
    cancelRequested = false;
    try {
      if (mode === 'blackbox') {
        await runBlackBox();
      } else {
        await runGlass();
      }
    } catch (e) {
      if (e.message === 'cancelled') {
        clearElements();
        continue;
      }
      break;
    }
  }
  loopRunning = false;
}

function switchMode() {
  const newMode = mode === 'blackbox' ? 'glass' : 'blackbox';
  cancelRequested = true;
  animationTimers.forEach(t => clearTimeout(t));
  animationTimers = [];
  // Small delay to let cancel propagate, then apply new mode
  setTimeout(() => {
    applyMode(newMode);
    clearElements();
    cancelRequested = false;
    if (!loopRunning) loop();
  }, 50);
}

$('toggle').addEventListener('click', switchMode);

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    switchMode();
  }
});

// Start
applyMode('blackbox');
setTimeout(loop, 400);
</script>
</body>
</html>
