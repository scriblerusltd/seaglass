<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seaglass</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    transition: background 0.8s ease, color 0.8s ease;
  }

  body.mode-blackbox {
    background: #080808;
    color: #e0e0e0;
  }

  body.mode-glass {
    background: #f4f3f1;
    color: #1a1a1a;
  }

  .wordmark {
    position: fixed;
    bottom: 24px;
    right: 28px;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.8s ease;
  }
  .mode-blackbox .wordmark { color: #282828; }
  .mode-glass .wordmark { color: #ccc; }

  /* Toggle */
  .toggle-container {
    margin-bottom: 48px;
    user-select: none;
    z-index: 10;
  }

  .toggle-track {
    display: flex;
    border-radius: 4px;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    transition: background 0.6s ease, border-color 0.6s ease;
  }

  .mode-blackbox .toggle-track { background: #141414; border: 1px solid #222; }
  .mode-glass .toggle-track { background: #e8e7e5; border: 1px solid #d0cfcd; }

  .toggle-option {
    padding: 10px 24px;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.08em;
    position: relative;
    z-index: 1;
    transition: color 0.4s ease;
    text-transform: uppercase;
  }

  .mode-blackbox .toggle-option { color: #555; }
  .mode-blackbox .toggle-option.active { color: #e0e0e0; }
  .mode-glass .toggle-option { color: #999; }
  .mode-glass .toggle-option.active { color: #1a1a1a; }

  .toggle-slider {
    position: absolute;
    top: 2px; left: 2px;
    height: calc(100% - 4px);
    width: calc(50% - 2px);
    border-radius: 3px;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                background 0.6s ease, border-color 0.6s ease;
  }

  .mode-blackbox .toggle-slider { background: #1e1e1e; border: 1px solid #2a2a2a; }
  .mode-glass .toggle-slider { background: #fff; border: 1px solid #d8d7d5; }
  .toggle-slider.glass-pos { transform: translateX(100%); }

  /* Stage */
  .stage {
    width: 92vw;
    max-width: 1200px;
    height: 420px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Prompt */
  .prompt {
    position: absolute;
    left: 0;
    font-size: 15px;
    font-weight: 300;
    line-height: 1.6;
    max-width: 240px;
    opacity: 0;
    transition: none;
  }
  .mode-blackbox .prompt { color: #666; }
  .mode-glass .prompt { color: #555; }

  /* Center box */
  .center-box {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .mode-blackbox .center-box {
    width: 140px; height: 140px;
    background: #0f0f0f;
    border: 1px solid #1a1a1a;
  }

  .mode-glass .center-box {
    width: 460px; height: 340px;
    background: rgba(0,0,0,0.02);
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 2px;
  }

  /* Output artifact */
  .artifact {
    position: absolute;
    right: 0;
    width: 260px;
    height: 320px;
    border-radius: 6px;
    overflow: hidden;
    opacity: 0;
    transform: scale(0.95);
    transition: none;
  }

  .mode-blackbox .artifact {
    background: #111;
    border: 1px solid #222;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .mode-glass .artifact {
    background: #fff;
    border: 1px solid #e0e0e0;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
  }

  .artifact-nav {
    height: 28px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 6px;
  }

  .mode-blackbox .artifact-nav { background: #1a1a1a; border-bottom: 1px solid #222; }
  .mode-glass .artifact-nav { background: #fafafa; border-bottom: 1px solid #eee; }

  .artifact-dot { width: 5px; height: 5px; border-radius: 50%; }
  .mode-blackbox .artifact-dot { background: #333; }
  .mode-glass .artifact-dot { background: #ccc; }

  .artifact-body { padding: 14px; }

  .artifact-title { height: 8px; width: 60%; border-radius: 2px; margin-bottom: 10px; }
  .mode-blackbox .artifact-title { background: #2a2a2a; }
  .mode-glass .artifact-title { background: #e0e0e0; }

  .artifact-subtitle { height: 5px; width: 40%; border-radius: 2px; margin-bottom: 16px; }
  .mode-blackbox .artifact-subtitle { background: #1e1e1e; }
  .mode-glass .artifact-subtitle { background: #eee; }

  .job-card { border-radius: 4px; padding: 10px; margin-bottom: 8px; }
  .mode-blackbox .job-card { background: #1a1a1a; border: 1px solid #222; }
  .mode-glass .job-card { background: #fafafa; border: 1px solid #eee; }

  .job-card-title { height: 5px; width: 70%; border-radius: 2px; margin-bottom: 6px; }
  .mode-blackbox .job-card-title { background: #333; }
  .mode-glass .job-card-title { background: #ddd; }

  .job-card-meta { display: flex; gap: 6px; }

  .job-tag { height: 4px; border-radius: 2px; }
  .mode-blackbox .job-tag { background: #2a2a2a; }
  .mode-glass .job-tag { background: #e8e8e8; }

  /* Processing text */
  .processing {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0;
  }
  .mode-blackbox .processing { color: #333; }
  .mode-glass .processing { color: #bbb; }

  /* Glass process steps */
  .process-step {
    position: absolute;
    font-size: 12px;
    font-weight: 300;
    opacity: 0;
    pointer-events: none;
    letter-spacing: 0.02em;
  }

  .step-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 5px;
  }

  .step-content {
    font-size: 11px;
    line-height: 1.5;
  }

  .step-layout .step-label { color: #3a7a8c; }
  .step-components .step-label { color: #8c6a3a; }
  .step-data .step-label { color: #4a8c3a; }
  .step-styles .step-label { color: #8c3a6a; }
  .step-logic .step-label { color: #5a4a8c; }

  .mode-glass .step-content { color: #444; }
  .mode-blackbox .step-content { color: #999; }

  /* Traveler */
  .traveler {
    position: absolute;
    font-size: 15px;
    font-weight: 300;
    opacity: 0;
    pointer-events: none;
    max-width: 240px;
    line-height: 1.6;
  }
</style>
</head>
<body class="mode-blackbox">

<div class="toggle-container">
  <div class="toggle-track" id="toggle">
    <div class="toggle-slider" id="slider"></div>
    <div class="toggle-option active" id="opt-blackbox">Black Box</div>
    <div class="toggle-option" id="opt-glass">Glass</div>
  </div>
</div>

<div class="stage" id="stage">
  <div class="prompt" id="prompt"></div>
  <div class="center-box" id="box"></div>
  <div class="processing" id="processing">processing</div>

  <div class="artifact" id="artifact">
    <div class="artifact-nav">
      <div class="artifact-dot"></div>
      <div class="artifact-dot"></div>
      <div class="artifact-dot"></div>
    </div>
    <div class="artifact-body">
      <div class="artifact-title"></div>
      <div class="artifact-subtitle"></div>
      <div class="job-card">
        <div class="job-card-title"></div>
        <div class="job-card-meta">
          <div class="job-tag" style="width:30px"></div>
          <div class="job-tag" style="width:40px"></div>
          <div class="job-tag" style="width:25px"></div>
        </div>
      </div>
      <div class="job-card">
        <div class="job-card-title" style="width:55%"></div>
        <div class="job-card-meta">
          <div class="job-tag" style="width:35px"></div>
          <div class="job-tag" style="width:28px"></div>
        </div>
      </div>
      <div class="job-card">
        <div class="job-card-title" style="width:65%"></div>
        <div class="job-card-meta">
          <div class="job-tag" style="width:25px"></div>
          <div class="job-tag" style="width:45px"></div>
          <div class="job-tag" style="width:30px"></div>
        </div>
      </div>
      <div class="job-card">
        <div class="job-card-title" style="width:50%"></div>
        <div class="job-card-meta">
          <div class="job-tag" style="width:38px"></div>
          <div class="job-tag" style="width:32px"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="wordmark">Seaglass</div>

<script>
const PROMPT_TEXT = "Build me a jobs page with search, filters, and card-based listings";

const PROCESS_STEPS = [
  {
    cls: 'step-layout',
    label: 'layout',
    content: 'header → search bar → filter row → card grid (2-col, responsive)',
  },
  {
    cls: 'step-components',
    label: 'components',
    content: 'SearchInput, FilterChip[], JobCard { title, company, tags[], posted }',
  },
  {
    cls: 'step-data',
    label: 'data model',
    content: 'Job { id, title, company, location, type, salary_range, posted_at }',
  },
  {
    cls: 'step-styles',
    label: 'styling',
    content: 'card: border-radius 8px, subtle shadow, hover lift · chips: pill, muted fill',
  },
  {
    cls: 'step-logic',
    label: 'interactions',
    content: 'debounced search → filter state → sorted results → paginated render',
  },
];

let mode = 'blackbox';
let runId = 0; // incremented on each switch to cancel previous run

const $ = id => document.getElementById(id);
const stage = $('stage');

function clearAll() {
  document.querySelectorAll('.process-step, .traveler').forEach(el => el.remove());
  $('prompt').textContent = '';
  $('prompt').style.opacity = '0';
  $('prompt').style.transform = '';
  $('prompt').style.transition = 'none';
  $('artifact').style.opacity = '0';
  $('artifact').style.transform = 'scale(0.95)';
  $('artifact').style.transition = 'none';
  $('processing').style.opacity = '0';
  $('processing').style.transition = 'none';
}

function wait(ms, id) {
  return new Promise((resolve, reject) => {
    setTimeout(() => {
      if (runId !== id) reject('cancelled');
      else resolve();
    }, ms);
  });
}

function anim(el, props, dur, id, ease = 'cubic-bezier(0.16, 1, 0.3, 1)') {
  return new Promise((resolve, reject) => {
    el.style.transition = `all ${dur}ms ${ease}`;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      if (runId !== id) { reject('cancelled'); return; }
      Object.assign(el.style, props);
      setTimeout(() => {
        if (runId !== id) reject('cancelled');
        else resolve();
      }, dur);
    }));
  });
}

async function runBlackBox(id) {
  clearAll();
  const prompt = $('prompt');
  const artifact = $('artifact');
  const box = $('box');
  const proc = $('processing');

  // Show prompt
  prompt.textContent = PROMPT_TEXT;
  await wait(200, id);
  await anim(prompt, { opacity: '1' }, 800, id);
  await wait(1200, id);

  // Prompt travels slowly toward the box
  const stageRect = stage.getBoundingClientRect();
  const promptRect = prompt.getBoundingClientRect();
  const boxRect = box.getBoundingClientRect();

  const traveler = document.createElement('div');
  traveler.className = 'traveler';
  traveler.textContent = PROMPT_TEXT;
  traveler.style.color = getComputedStyle(prompt).color;
  traveler.style.left = (promptRect.left - stageRect.left) + 'px';
  traveler.style.top = (promptRect.top - stageRect.top) + 'px';
  traveler.style.maxWidth = '240px';
  traveler.style.opacity = '1';
  stage.appendChild(traveler);
  prompt.style.opacity = '0';

  const boxCenterX = boxRect.left - stageRect.left + boxRect.width / 2 - 120;
  const boxCenterY = boxRect.top - stageRect.top + boxRect.height / 2 - 20;

  // Slow, smooth glide toward the box
  await anim(traveler, {
    left: boxCenterX + 'px',
    top: boxCenterY + 'px',
    opacity: '0.4',
  }, 1800, id, 'cubic-bezier(0.25, 0.1, 0.25, 1)');

  // Final absorption into the box
  await anim(traveler, {
    left: (boxRect.left - stageRect.left + boxRect.width / 2 - 40) + 'px',
    top: (boxRect.top - stageRect.top + boxRect.height / 2 - 10) + 'px',
    opacity: '0',
    transform: 'scale(0.85)',
  }, 800, id, 'cubic-bezier(0.4, 0, 1, 1)');
  traveler.remove();

  // Processing
  await anim(proc, { opacity: '1' }, 400, id);
  const dots = ['', '.', '..', '...'];
  for (let i = 0; i < 6; i++) {
    proc.textContent = 'processing' + dots[i % 4];
    await wait(400, id);
  }
  await anim(proc, { opacity: '0' }, 400, id);
  await wait(300, id);

  // Artifact appears
  await anim(artifact, { opacity: '1', transform: 'scale(1)' }, 800, id);
  await wait(2800, id);

  // Fade out
  await anim(artifact, { opacity: '0', transform: 'scale(0.95)' }, 600, id);
  await wait(500, id);
}

async function runGlass(id) {
  clearAll();
  const prompt = $('prompt');
  const artifact = $('artifact');
  const box = $('box');

  // Show prompt
  prompt.textContent = PROMPT_TEXT;
  await wait(200, id);
  await anim(prompt, { opacity: '1' }, 800, id);
  await wait(1000, id);

  // Prompt glides toward the glass box and fades
  const stageRect = stage.getBoundingClientRect();
  const promptRect = prompt.getBoundingClientRect();
  const boxRect = box.getBoundingClientRect();

  const traveler = document.createElement('div');
  traveler.className = 'traveler';
  traveler.textContent = PROMPT_TEXT;
  traveler.style.color = '#555';
  traveler.style.left = (promptRect.left - stageRect.left) + 'px';
  traveler.style.top = (promptRect.top - stageRect.top) + 'px';
  traveler.style.maxWidth = '240px';
  traveler.style.opacity = '1';
  stage.appendChild(traveler);
  prompt.style.opacity = '0';

  const boxLeft = boxRect.left - stageRect.left;
  const boxTop = boxRect.top - stageRect.top;
  const boxW = boxRect.width;
  const boxH = boxRect.height;

  // Slow glide into the glass
  await anim(traveler, {
    left: (boxLeft + 20) + 'px',
    top: (boxTop + 14) + 'px',
    opacity: '0.3',
  }, 1600, id, 'cubic-bezier(0.25, 0.1, 0.25, 1)');

  await anim(traveler, { opacity: '0' }, 400, id);
  traveler.remove();

  await wait(300, id);

  // Process steps appear inside the glass box, staggered
  const stepEls = [];
  const stepH = 58;
  const totalH = PROCESS_STEPS.length * stepH;
  const startY = boxTop + (boxH - totalH) / 2 + 10;

  for (let i = 0; i < PROCESS_STEPS.length; i++) {
    const s = PROCESS_STEPS[i];
    const el = document.createElement('div');
    el.className = `process-step ${s.cls}`;
    el.innerHTML = `<span class="step-label">${s.label}</span><span class="step-content">${s.content}</span>`;
    el.style.left = (boxLeft + 24) + 'px';
    el.style.top = (startY + i * stepH) + 'px';
    el.style.maxWidth = (boxW - 48) + 'px';
    el.style.transform = 'translateY(8px)';
    stage.appendChild(el);
    stepEls.push(el);

    await wait(250, id);
    await anim(el, { opacity: '1', transform: 'translateY(0)' }, 500, id);
  }

  await wait(600, id);

  // Each step highlights in sequence
  for (let i = 0; i < stepEls.length; i++) {
    const el = stepEls[i];
    const label = el.querySelector('.step-label');
    const content = el.querySelector('.step-content');

    // Highlight active step
    await anim(el, { transform: 'translateX(6px)' }, 350, id);
    if (content) content.style.opacity = '1';
    if (label) label.style.opacity = '1';
    await wait(700, id);

    // Dim after processing
    await anim(el, { transform: 'translateX(0)', opacity: '0.35' }, 350, id);
    await wait(150, id);
  }

  await wait(400, id);

  // Steps converge toward center and fade
  for (let i = 0; i < stepEls.length; i++) {
    const el = stepEls[i];
    anim(el, {
      top: (boxTop + boxH / 2 - 10) + 'px',
      opacity: '0',
      transform: 'scale(0.9)'
    }, 700, id).catch(() => {});
    await wait(100, id);
  }

  await wait(800, id);
  stepEls.forEach(el => el.remove());

  // Artifact materializes
  await anim(artifact, { opacity: '1', transform: 'scale(1)' }, 800, id);
  await wait(2800, id);

  // Fade out
  await anim(artifact, { opacity: '0', transform: 'scale(0.95)' }, 600, id);
  await wait(500, id);
}

function applyMode(m) {
  mode = m;
  document.body.className = `mode-${mode}`;
  if (mode === 'glass') {
    $('slider').classList.add('glass-pos');
    $('opt-blackbox').classList.remove('active');
    $('opt-glass').classList.add('active');
  } else {
    $('slider').classList.remove('glass-pos');
    $('opt-blackbox').classList.add('active');
    $('opt-glass').classList.remove('active');
  }
}

async function loop(id) {
  while (runId === id) {
    try {
      if (mode === 'blackbox') await runBlackBox(id);
      else await runGlass(id);
    } catch (e) {
      break; // cancelled — a new loop will be started
    }
  }
}

function switchMode() {
  const next = mode === 'blackbox' ? 'glass' : 'blackbox';
  runId++; // invalidates all pending waits/anims
  applyMode(next);
  clearAll();
  // Let the CSS transition settle, then start
  const id = runId;
  setTimeout(() => {
    if (runId === id) loop(id);
  }, 100);
}

$('toggle').addEventListener('click', switchMode);
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); switchMode(); }
});

applyMode('blackbox');
const startId = runId;
setTimeout(() => { if (runId === startId) loop(startId); }, 400);
</script>
</body>
</html>
